<!DOCTYPE html>
<html lang="en" data-page="apidocs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Docs - MIKLIUM</title>
  <meta name="description" content="Here you will find detailed documentation for each of our APIs.">
  <meta property="og:title" content="API Docs - MIKLIUM">
  <meta property="og:description" content="Here you will find detailed documentation for each of our APIs.">
  <meta property="og:image" content="https://raw.githubusercontent.com/MIKLIUM/MIKLIUM/refs/heads/main/webpage/assets/Logo_Original.png">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#0155A1">
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/MIKLIUM/MIKLIUM/refs/heads/main/webpage/assets/Logo_Original.png">
  <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/MIKLIUM/MIKLIUM/refs/heads/main/webpage/assets/Logo_Original.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    main {
      flex: 1;
      padding: 2rem;
      max-width: 960px;
      margin: 0 auto;
      width: 100%;
      padding-top: calc(var(--nav-height) + 48px);
    }
    
    .count-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--accent-border);
      box-shadow: inset 0 1px 0 var(--glass-highlight);
      color: var(--accent);
      padding: 0.35rem 1rem;
      border-radius: var(--radius-pill);
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }
    
    .code-block-wrapper {
      position: relative;
      margin: 1rem 0;
    }
    
    .code-block-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(13, 17, 23, 0.9);
      border: 1px solid var(--border);
      border-bottom: none;
      border-radius: 12px 12px 0 0;
      padding: 0.5rem 0.85rem;
    }
    
    .code-block-lang {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .code-block-lang i {
      font-size: 0.8rem;
    }
    
    .code-copy-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
      padding: 0.25rem 0.65rem;
      border-radius: var(--radius-pill);
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-tertiary);
      cursor: pointer;
      transition: all 0.3s var(--transition-smooth);
      font-size: 0.7rem;
      font-weight: 500;
      font-family: inherit;
    }
    
    .code-copy-btn:hover {
      color: var(--text-primary);
      border-color: var(--border-hover);
      background: var(--surface-hover);
    }
    
    .code-copy-btn.copied {
      color: #22c55e;
      border-color: rgba(34, 197, 94, 0.3);
      background: rgba(34, 197, 94, 0.08);
    }
    
    .code-block-wrapper pre {
      margin: 0 !important;
      border-radius: 0 0 12px 12px !important;
      border: 1px solid var(--border) !important;
      border-top: none !important;
    }
    
    #api-content a[href^="http"],
    #api-content a[href^="https"] {
      word-break: break-all;
    }
    
    .link-copy-wrapper {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      flex-wrap: wrap;
    }
    
    .link-copy-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.15rem 0.4rem;
      border-radius: var(--radius-pill);
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-tertiary);
      cursor: pointer;
      transition: all 0.3s var(--transition-smooth);
      font-size: 0.6rem;
      font-family: inherit;
      flex-shrink: 0;
    }
    
    .link-copy-btn:hover {
      color: var(--text-primary);
      border-color: var(--border-hover);
      background: var(--surface-hover);
    }
    
    .link-copy-btn.copied {
      color: #22c55e;
      border-color: rgba(34, 197, 94, 0.3);
      background: rgba(34, 197, 94, 0.08);
    }
    
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      padding: 0.6rem 1.2rem;
      border-radius: var(--radius-pill);
      background: rgba(20, 20, 22, 0.9);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      color: var(--text-primary);
      font-size: 0.82rem;
      font-weight: 500;
      opacity: 0;
      pointer-events: none;
      transition: all 0.4s var(--transition-smooth);
      z-index: 200;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    
    .toast i {
      color: #22c55e;
    }
    
    .code-block-wrapper pre code {
      font-size: 0.8rem;
      line-height: 1.5;
    }
    
    .link-copy-wrapper {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      max-width: 100%;
    }
    
    .link-copy-wrapper a {
      word-break: break-all;
      min-width: 0;
    }
    
    #api-content table .link-copy-btn {
      display: inline-flex;
      vertical-align: middle;
      margin-left: 0.25rem;
    }
    
    .link-copy-wrapper code {
      word-break: break-all;
    }
    
    @media (max-width: 600px) {
      .code-block-wrapper pre code {
        font-size: 1.1rem;
      }
      
      .link-copy-btn {
        padding: 0.2rem 0.45rem;
        font-size: 0.65rem;
      }
      
      .link-copy-wrapper {
        display: inline;
      }
    
      .link-copy-wrapper code {
        font-size: 0.78rem;
      }
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-top">
      <a href="index.html" class="nav-brand">
        <img src="assets/Logo.svg" alt="" class="nav-logo">
        MIKLIUM
      </a>
      <button class="nav-toggle" aria-label="Menu"><i class="fas fa-bars"></i></button>
      <ul class="nav-links">
        <li><a href="index.html" data-nav="home">Home</a></li>
        <li><a href="projects.html" data-nav="projects">Projects</a></li>
        <li><a href="GetStarted.html" data-nav="getstarted">Get Started</a></li>
        <li><a href="APIDOCS.html" data-nav="apidocs">API Docs</a></li>
        <li><a href="playground.html" data-nav="playground">Playground</a></li>
        <li><a href="support.html" data-nav="support">Support</a></li>
        <li class="nav-icons">
          <a href="https://discord.gg/6HUJTXh45t" target="_blank" title="Discord"><i class="fab fa-discord"></i></a>
          <a href="https://github.com/MIKLIUM" target="_blank" title="GitHub"><i class="fab fa-github"></i></a>
        </li>
      </ul>
    </div>
    <div class="nav-mobile-links">
      <a href="index.html" data-nav="home"><i class="fas fa-house"></i> Home</a>
      <a href="projects.html" data-nav="projects"><i class="fas fa-cube"></i> Featured Projects</a>
      <a href="GetStarted.html" data-nav="getstarted"><i class="fas fa-play"></i> Get Started</a>
      <a href="APIDOCS.html" data-nav="apidocs"><i class="fas fa-book"></i> API Docs</a>
      <a href="playground.html" data-nav="playground"><i class="fas fa-flask"></i> API Playground</a>
      <a href="support.html" data-nav="support"><i class="fas fa-headset"></i> Support</a>
      <div class="nav-mobile-icons">
        <a href="https://discord.gg/6HUJTXh45t" target="_blank"><i class="fab fa-discord"></i></a>
        <a href="https://github.com/MIKLIUM" target="_blank"><i class="fab fa-github"></i></a>
      </div>
    </div>
  </nav>
  <main>
    <div class="page-header">
      <h2>API Documentation</h2>
      <span class="count-badge" id="api-count"><i class="fas fa-spinner fa-spin"></i></span>
      <p>Here you will find detailed documentation for each of our APIs.</p>
    </div>
    <div id="api-content">
      <div class="loading">
        <i class="fas fa-spinner fa-spin"></i>
        Loading documentation...
      </div>
    </div>
  </main>
  <button id="scrollTop" class="scroll-top-btn" aria-label="Scroll to top">
    <i class="fas fa-arrow-up"></i>
  </button>
  <div class="toast" id="toast">
    <i class="fas fa-check-circle"></i>
    <span id="toastText">Copied to clipboard</span>
  </div>
<script>
document.addEventListener("DOMContentLoaded", function () {
  var page = document.documentElement.getAttribute("data-page");
  document.querySelectorAll("[data-nav]").forEach(function (a) {
    if (a.getAttribute("data-nav") === page) a.classList.add("active");
  });
  var toggle = document.querySelector(".nav-toggle");
  var mobileLinks = document.querySelector(".nav-mobile-links");
  var navEl = document.querySelector("nav");
  if (toggle && mobileLinks && navEl) {
    toggle.addEventListener("click", function () {
      var open = mobileLinks.classList.toggle("open");
      navEl.classList.toggle("nav-expanded", open);
      toggle.innerHTML = open ? '<i class="fas fa-xmark"></i>' : '<i class="fas fa-bars"></i>';
    });
  }

  var scrollBtn = document.getElementById("scrollTop");
  var toastEl = document.getElementById("toast");
  var toastTextEl = document.getElementById("toastText");
  var toastTimeout = null;

  window.addEventListener("scroll", function() {
    if (window.scrollY > 300) {
      scrollBtn.classList.add("visible");
    } else {
      scrollBtn.classList.remove("visible");
    }
  });

  scrollBtn.addEventListener("click", function() {
    window.scrollTo({ top: 0, behavior: "smooth" });
  });

  function showToast(message) {
    toastTextEl.textContent = message;
    toastEl.classList.add("visible");
    if (toastTimeout) clearTimeout(toastTimeout);
    toastTimeout = setTimeout(function() { toastEl.classList.remove("visible"); }, 2000);
  }

  function scrollToWithOffset(target) {
    var navHeight = document.querySelector("nav").offsetHeight;
    var rect = target.getBoundingClientRect();
    var viewportThird = (window.innerHeight - navHeight) / 3;
    var scrollTarget = window.scrollY + rect.top - navHeight - viewportThird;
    window.scrollTo({ top: Math.max(0, scrollTarget), behavior: "smooth" });
  }

  var slugs = {};

  function escapeHtml(str) {
    if (str == null) return "";
    if (typeof str !== "string") str = String(str);
    return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
  }

  function slugify(text) {
    var slug = String(text).toLowerCase().replace(/[^a-z0-9\s-]/g, "").replace(/\s+/g, "-");
    if (slugs[slug]) { slugs[slug]++; slug = slug + "-" + (slugs[slug] - 1); }
    else { slugs[slug] = 1; }
    return slug;
  }

  function getLangInfo(lang) {
    var map = {
      javascript: { icon: "fab fa-js", name: "JavaScript" },
      json: { icon: "fas fa-code", name: "JSON" },
      python: { icon: "fab fa-python", name: "Python" },
      bash: { icon: "fas fa-terminal", name: "Bash" },
      shell: { icon: "fas fa-terminal", name: "Shell" },
      text: { icon: "fas fa-file-lines", name: "Text" },
      html: { icon: "fab fa-html5", name: "HTML" },
      css: { icon: "fab fa-css3-alt", name: "CSS" }
    };
    return map[lang] || { icon: "fas fa-code", name: lang.charAt(0).toUpperCase() + lang.slice(1) };
  }

  function detectJsonInJs(code, lang) {
    if (lang !== "javascript") return lang;
    var trimmed = code.trim();
    var cleaned = trimmed.replace(/\/\/.*$/gm, "").trim();
    if ((cleaned.charAt(0) === "{" && cleaned.charAt(cleaned.length - 1) === "}") ||
        (cleaned.charAt(0) === "[" && cleaned.charAt(cleaned.length - 1) === "]")) {
      return "json";
    }
    return lang;
  }

  async function loadAPIDocs() {
    var el = document.getElementById("api-content");
    var countBadge = document.getElementById("api-count");
    try {
      var res = await fetch("https://raw.githubusercontent.com/MIKLIUM/MIKLIUM/refs/heads/main/APIDOCS.md");
      if (!res.ok) throw new Error("HTTP " + res.status);
      var md = await res.text();
      var processedMd = md.replace(/^# MIKLIUM API Documentation\s*(\r\n|\r|\n)/, "");
      processedMd = processedMd.replace(/\*\*\[Back to MIKLIUM APIs navigation\]\(#navigation\)\*\*/g, "");

      var apiCountMatch = processedMd.match(/>\s*\*\*(\d+)\s+APIs?\s+are\s+avai[l]?able/i);
      if (apiCountMatch) {
        countBadge.textContent = apiCountMatch[1] + " APIs available";
      } else {
        var h1Matches = processedMd.match(/^# .+ API Documentation$/gm);
        var apiNum = h1Matches ? h1Matches.length : 0;
        countBadge.textContent = apiNum + " APIs available";
      }

      processedMd = processedMd.replace(/>\s*\*\*\d+\s+APIs?\s+are\s+avai[l]?able\s+now:\*\*/g, "");

      var renderer = {
        blockquote: function (token) {
          var raw = token.text;
          if (raw.startsWith("[!IMPORTANT]"))
            return '<div class="alert alert-important">' + escapeHtml(raw.replace("[!IMPORTANT]", "").trim()) + "</div>";
          if (raw.startsWith("[!WARNING]"))
            return '<div class="alert alert-warning">' + escapeHtml(raw.replace("[!WARNING]", "").trim()) + "</div>";
          if (raw.startsWith("[!NOTE]"))
            return '<div class="alert alert-note">' + escapeHtml(raw.replace("[!NOTE]", "").trim()) + "</div>";
          return false;
        },
        code: function (token) {
          var lang = (token.lang || "").split(/\s+/)[0] || "text";
          var displayLang = detectJsonInJs(token.text, lang);
          var highlighted;
          var highlightLang = displayLang === "json" ? "json" : lang;
          try {
            if (highlightLang !== "text" && hljs.getLanguage(highlightLang))
              highlighted = hljs.highlight(token.text, { language: highlightLang }).value;
            else highlighted = hljs.highlightAuto(token.text).value;
          } catch (e) { highlighted = escapeHtml(token.text); }

          var info = getLangInfo(displayLang);
          var escapedCode = escapeHtml(token.text);

          return '<div class="code-block-wrapper">' +
            '<div class="code-block-header">' +
              '<span class="code-block-lang"><i class="' + info.icon + '"></i> ' + info.name + '</span>' +
              '<button class="code-copy-btn" data-code="' + escapedCode + '"><i class="fas fa-copy"></i> Copy</button>' +
            '</div>' +
            '<pre><code class="hljs language-' + escapeHtml(highlightLang) + '">' + highlighted + '</code></pre>' +
          '</div>';
        },
        heading: function (token) {
          var textStr = this.parser.parseInline(token.tokens);
          var id = slugify(token.text);
          return "<h" + token.depth + ' id="' + id + '" class="anchor-header">' + textStr + '<a href="#' + id + '" class="anchor-link" aria-hidden="true">#</a></h' + token.depth + ">";
        }
      };

      marked.use({ renderer: renderer });
      el.innerHTML = marked.parse(processedMd);
      
      (function() {
          var walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, null, false);
          var textNodes = [];
          var node;
          while (node = walker.nextNode()) {
              if (node.parentNode.closest(".code-block-wrapper")) continue;
              if (node.parentNode.closest("a")) continue;
              if (node.parentNode.closest(".link-copy-wrapper")) continue;
              if (node.parentNode.tagName === "CODE" && node.parentNode.closest("pre")) continue;
              if (/https?:\/\//.test(node.textContent)) {
                  textNodes.push(node);
              }
          }
          textNodes.forEach(function(textNode) {
              var text = textNode.textContent;
              var regex = /(https?:\/\/[^\s<"'`]+)/g;
              var parts = text.split(regex);
              if (parts.length <= 1) return;
              var frag = document.createDocumentFragment();
              parts.forEach(function(part) {
                  if (/^https?:\/\//.test(part)) {
                      var cleanUrl = part.replace(/[.,;:!?]+$/, "");
                      var trailing = part.substring(cleanUrl.length);
                      var codeEl = document.createElement("code");
                      codeEl.textContent = cleanUrl;
                      frag.appendChild(codeEl);
                      if (trailing) frag.appendChild(document.createTextNode(trailing));
                  } else {
                      frag.appendChild(document.createTextNode(part));
                  }
              });
              textNode.parentNode.replaceChild(frag, textNode);
          });
      })();

      el.addEventListener("click", function(e) {
        var copyBtn = e.target.closest(".code-copy-btn");
        if (copyBtn) {
          var code = copyBtn.getAttribute("data-code");
          var decoded = code.replace(/&amp;/g, "&").replace(/&lt;/g, "<").replace(/&gt;/g, ">").replace(/&quot;/g, '"').replace(/&#039;/g, "'");
          navigator.clipboard.writeText(decoded).then(function() {
            copyBtn.classList.add("copied");
            copyBtn.innerHTML = '<i class="fas fa-check"></i> Copied';
            showToast("Code copied to clipboard");
            setTimeout(function() {
              copyBtn.classList.remove("copied");
              copyBtn.innerHTML = '<i class="fas fa-copy"></i> Copy';
            }, 1500);
          });
          return;
        }
      
        var linkCopyBtn = e.target.closest(".link-copy-btn");
        if (linkCopyBtn) {
          var url = linkCopyBtn.getAttribute("data-url");
          navigator.clipboard.writeText(url).then(function() {
            linkCopyBtn.classList.add("copied");
            linkCopyBtn.innerHTML = '<i class="fas fa-check"></i>';
            showToast("Link copied to clipboard");
            setTimeout(function() {
              linkCopyBtn.classList.remove("copied");
              linkCopyBtn.innerHTML = '<i class="fas fa-copy"></i>';
            }, 1500);
          });
          return;
        }
      
        var anyLink = e.target.closest("a");
        if (anyLink) {
          var href = anyLink.getAttribute("href");
          if (href && href.charAt(0) === "#") {
            e.preventDefault();
            var target = document.getElementById(href.substring(1));
            if (target) {
              history.pushState(null, null, href);
              scrollToWithOffset(target);
            }
            return;
          }
        }
      });
      
      setTimeout(function() {
        var allLinks = el.getElementsByTagName("a");
        for (var i = allLinks.length - 1; i >= 0; i--) {
          var link = allLinks[i];
          if (link.classList.contains("anchor-link")) continue;
          if (link.closest(".code-block-wrapper")) continue;
          if (link.closest(".link-copy-wrapper")) continue;
          var href = link.getAttribute("href");
          if (!href) continue;
          if (href.charAt(0) === "#") continue;
          if (href.indexOf("://") === -1 && href.indexOf("//") !== 0) continue;
      
          var copyBtn = document.createElement("button");
          copyBtn.className = "link-copy-btn";
          copyBtn.setAttribute("data-url", href);
          copyBtn.title = "Copy link";
          copyBtn.type = "button";
          copyBtn.innerHTML = '<i class="fas fa-copy"></i>';
      
          var parent = link.parentNode;
          if (link.closest("table")) {
            if (link.nextSibling) {
              parent.insertBefore(copyBtn, link.nextSibling);
            } else {
              parent.appendChild(copyBtn);
            }
          } else {
            var wrapper = document.createElement("span");
            wrapper.className = "link-copy-wrapper";
            parent.insertBefore(wrapper, link);
            wrapper.appendChild(link);
            wrapper.appendChild(copyBtn);
          }
        }
      
        var allCodes = el.querySelectorAll("code");
        for (var j = 0; j < allCodes.length; j++) {
          var codeEl = allCodes[j];
          if (codeEl.closest(".code-block-wrapper")) continue;
          if (codeEl.closest(".link-copy-wrapper")) continue;
          if (codeEl.querySelector(".link-copy-btn")) continue;
          var codeText = codeEl.textContent.trim();
          if (!/^https?:\/\/\S+$/.test(codeText)) continue;
      
          var wrapper = document.createElement("span");
          wrapper.className = "link-copy-wrapper";
          codeEl.parentNode.insertBefore(wrapper, codeEl);
          wrapper.appendChild(codeEl);
          var cb = document.createElement("button");
          cb.className = "link-copy-btn";
          cb.setAttribute("data-url", codeText);
          cb.title = "Copy link";
          cb.type = "button";
          cb.innerHTML = '<i class="fas fa-copy"></i>';
          wrapper.appendChild(cb);
        }
      }, 100);
      
      if (location.hash) {
        setTimeout(function() {
          var target = document.querySelector(location.hash);
          if (target) scrollToWithOffset(target);
        }, 200);
      }
    } catch (err) {
      el.innerHTML = '<div class="error"><i class="fas fa-exclamation-triangle"></i><h3>Error Loading Documentation</h3><p>' + escapeHtml(err.message) + "</p></div>";
    }
  }

  loadAPIDocs();
});
</script>
</body>
