name: Readme and Apidocs Updater

on:
  push:
    branches: [main]
    paths:
      - 'api/**/README.md'
      - 'FEATURED_PROJECTS.md'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PROJECT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Generate APIDOCS.md and update README.md
        run: |
          python3 -c "
          import os
          import re

          root = 'api'
          exclude = 'beta'
          out = 'APIDOCS.md'
          docs = []

          def get_slug(text):
              s = text.lower().strip()
              s = re.sub(r'[^a-z0-9\- ]', '', s)
              s = s.replace(' ', '-')
              return s

          api_dirs = []
          if os.path.exists(root):
              dirs = sorted([d for d in os.listdir(root) if os.path.isdir(os.path.join(root, d))])
              for d in dirs:
                  if d == exclude: continue
                  path = os.path.join(root, d, 'README.md')
                  if os.path.exists(path):
                      api_dirs.append(d)
                      with open(path, 'r', encoding='utf-8') as f:
                          c = f.read()
                      m = re.search(r'^#\s+(.+)$', c, re.MULTILINE)
                      t = m.group(1).strip() if m else d
                      s = get_slug(t)
                      docs.append({'t': t, 's': s, 'c': c, 'dir': d})

          api_count = len(docs)

          md = '# MIKLIUM API Documentation\n'
          md += '# Navigation\n### Information\n - [MIKLIUM API Documentation](#miklium-api-documentation)\n - [Navigation](#navigation)\n - [About MIKLIUM APIs](#about-miklium-apis)\n### APIs Documentations\n'
          md += '> **' + str(api_count) + ' APIs are avaiable now:**\n'
          anchor_counts = {}

          for m2 in re.finditer(r'^#+\s+(.+)$', md, re.MULTILINE):
              slug = get_slug(m2.group(1))
              anchor_counts[slug] = anchor_counts.get(slug, -1) + 1

          temp_counts = anchor_counts.copy()
          for d in docs:
              slug = get_slug(d['t'])
              count = temp_counts.get(slug, -1) + 1
              temp_counts[slug] = count
              suffix = f'-{count}' if count > 0 else ''
              md += f\" - [{d['t']}](#{slug}{suffix})\n\"

          md += '\n# About MIKLIUM APIs\n\nAt MIKLIUM, we empower developers and users with high-quality, free APIs and software tools to help you build, innovate, and explore without limits. Here you will find detailed documentation for each of our APIs.\n'

          for d in docs:
              content = d['c']
              replacements = {}
              local_counts = {}

              headers = re.finditer(r'^#+\s+(.+)$', content, re.MULTILINE)

              for h in headers:
                  title = h.group(1)
                  base_slug = get_slug(title)

                  l_cnt = local_counts.get(base_slug, -1) + 1
                  local_counts[base_slug] = l_cnt
                  local_link = base_slug + (f'-{l_cnt}' if l_cnt > 0 else '')

                  g_cnt = anchor_counts.get(base_slug, -1) + 1
                  anchor_counts[base_slug] = g_cnt
                  global_link = base_slug + (f'-{g_cnt}' if g_cnt > 0 else '')

                  if local_link != global_link:
                      replacements[f'(#{local_link})'] = f'(#{global_link})'

              for old, new in replacements.items():
                  content = content.replace(old, new)

              md += '\n---\n'
              lines = content.split('\n')
              res = []
              for l in lines:
                  res.append(l)
                  if l.strip().startswith('## Navigation'):
                      res.append('**[Back to MIKLIUM APIs navigation](#navigation)**\n')

              md += '\n'.join(res) + '\n'

          with open(out, 'w', encoding='utf-8') as f:
              f.write(md)

          with open('README.md', 'r', encoding='utf-8') as f:
              readme = f.read()

          api_list_start = '<!-- API_LIST_START -->'
          api_list_end = '<!-- API_LIST_END -->'
          api_count_start = '<!-- API_COUNT_START -->'
          api_count_end = '<!-- API_COUNT_END -->'

          if api_list_start in readme and api_list_end in readme:
              api_bullets = ''
              for d in docs:
                  api_bullets += f'  - [{d["t"]}](api/{d["dir"]}/README.md)\n'
              api_section = api_list_start + '\n' + api_bullets + api_list_end
              pattern = re.escape(api_list_start) + r'.*?' + re.escape(api_list_end)
              readme = re.sub(pattern, api_section, readme, flags=re.DOTALL)

          if api_count_start in readme and api_count_end in readme:
              count_pattern = re.escape(api_count_start) + r'.*?' + re.escape(api_count_end)
              readme = re.sub(count_pattern, api_count_start + str(api_count) + api_count_end, readme)

          readme_feat_start = '<!-- FEATURED_PROJECTS_START -->'
          readme_feat_end = '<!-- FEATURED_PROJECTS_END -->'
          readme_feat_count_start = '<!-- README_FEATURED_COUNT_START -->'
          readme_feat_count_end = '<!-- README_FEATURED_COUNT_END -->'
          fp_table_start = '<!-- FEATURED_PROJECTS_TABLE_START -->'
          fp_table_end = '<!-- FEATURED_PROJECTS_TABLE_END -->'

          if os.path.exists('FEATURED_PROJECTS.md') and readme_feat_start in readme and readme_feat_end in readme:
              with open('FEATURED_PROJECTS.md', 'r', encoding='utf-8') as f:
                  fp_content = f.read()

              if fp_table_start in fp_content and fp_table_end in fp_content:
                  s_idx = fp_content.index(fp_table_start) + len(fp_table_start)
                  e_idx = fp_content.index(fp_table_end)
                  middle = fp_content[s_idx:e_idx]
                  fp_lines = [l.strip() for l in middle.strip().split('\n') if l.strip()]
                  header_lines = [l for l in fp_lines if l.startswith('| Name') or l.startswith('| ---') or l.startswith('|---') or l.startswith('| -')]
                  data_lines = [l for l in fp_lines if l not in header_lines]
                  total = len(data_lines)

                  display = data_lines[:3]
                  table = '| Name | Description | Creator |\n|------|-------------|---------|'
                  for row in display:
                      table += '\n' + row

                  if total > 3:
                      table += f'\n\n> **{total} projects total!** [See all projects →](FEATURED_PROJECTS.md)'
                  else:
                      table += '\n\n[See all projects →](FEATURED_PROJECTS.md)'

                  feat_pattern = re.escape(readme_feat_start) + r'.*?' + re.escape(readme_feat_end)
                  feat_replacement = readme_feat_start + '\n' + table + '\n' + readme_feat_end
                  readme = re.sub(feat_pattern, feat_replacement, readme, flags=re.DOTALL)

                  if readme_feat_count_start in readme and readme_feat_count_end in readme:
                      fc_pattern = re.escape(readme_feat_count_start) + r'.*?' + re.escape(readme_feat_count_end)
                      readme = re.sub(fc_pattern, readme_feat_count_start + str(total) + readme_feat_count_end, readme)

          with open('README.md', 'w', encoding='utf-8') as f:
              f.write(readme)
          "

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update APIDOCS.md and README.md"
          file_pattern: "APIDOCS.md README.md"
        env:
          GITHUB_TOKEN: ${{ secrets.PROJECT_TOKEN }}