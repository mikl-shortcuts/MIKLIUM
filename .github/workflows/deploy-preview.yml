name: Deploy Previews

on:
  pull_request_target:
    branches-ignore:
      - 'main'
    paths-ignore:
      - '**/*.md'
      - '.github/**'
      - 'beta/**'
      - 'docs/**'
      - 'webpage/**'

permissions:
  deployments: write
  contents: read

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    environment:
      name: ${{ contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.pull_request.author_association) && 'internal' || 'external' }}
    outputs:
      vercel_url: ${{ steps.deploy.outputs.preview_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Trigger Render Preview Deploy
        run: |
          curl -sS -X POST "${{ secrets.RENDER_PREVIEW_DEPLOY_HOOK }}"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=preview
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Project Artifacts
        run: vercel build
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy Project Artifacts to Vercel
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt)
          echo "preview_url=$URL" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  run-tests:
    needs: deploy-preview
    uses: ./.github/workflows/api-tests.yml
    with:
      deploy_url: ${{ needs.deploy-preview.outputs.vercel_url }}
    secrets: inherit
