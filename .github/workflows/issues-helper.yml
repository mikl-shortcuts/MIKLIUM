name: Issues Helper

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write
  repository-projects: write

jobs:
  set-priority:
    if: >
      github.event.action == 'opened' ||
      (github.event.action == 'labeled' && contains(fromJson('["asap", "bug", "help wanted", "enhancement", "project submission", "documentation"]'), github.event.label.name))
    runs-on: ubuntu-latest
    steps:
      - name: Add issue to project and set priority
        uses: actions/github-script@v7
        env:
          PROJECT_NUMBER: 2
          ORGANIZATION: MIKLIUM-Team
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const org = process.env.ORGANIZATION;
            const projectNumber = parseInt(process.env.PROJECT_NUMBER);
            const issueNodeId = context.payload.issue.node_id;
            const labels = context.payload.issue.labels.map(l => l.name);

            const priorityMap = {
              'asap': 'Urgent',
              'bug': 'Medium',
              'help wanted': 'High',
              'enhancement': 'Medium',
              'project submission': 'Low',
              'documentation': 'Low'
            };

            let priority = 'No Priority';
            const precedence = ['Urgent', 'High', 'Medium', 'Low', 'No Priority'];

            for (const label of labels) {
              const mapped = priorityMap[label.toLowerCase()];
              if (mapped && precedence.indexOf(mapped) < precedence.indexOf(priority)) {
                priority = mapped;
              }
            }

            const projectQuery = await github.graphql(`
              query($org: String!, $number: Int!) {
                organization(login: $org) {
                  projectV2(number: $number) {
                    id
                    fields(first: 20) {
                      nodes {
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                          options { id name }
                        }
                      }
                    }
                  }
                }
              }
            `, { org, number: projectNumber });

            const project = projectQuery.organization.projectV2;
            const projectId = project.id;

            const priorityField = project.fields.nodes.find(f => f.name === 'Priority');
            if (!priorityField) {
              core.setFailed('Priority field not found in project');
              return;
            }

            const priorityOption = priorityField.options.find(o => o.name === priority);
            if (!priorityOption) {
              core.setFailed(`Priority option "${priority}" not found`);
              return;
            }

            const issueStatusQuery = await github.graphql(`
              query($issueId: ID!) {
                node(id: $issueId) {
                  ... on Issue {
                    projectItems(first: 10) {
                      nodes {
                        id
                        project { id }
                        fieldValues(first: 20) {
                          nodes {
                            ... on ProjectV2ItemFieldSingleSelectValue {
                              name
                              field {
                                ... on ProjectV2SingleSelectField { name }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `, { issueId: issueNodeId });

            const existingItems = issueStatusQuery.node.projectItems.nodes;
            const existingItem = existingItems.find(item => item.project.id === projectId);
            
            let itemId;

            if (existingItem) {
              itemId = existingItem.id;
              const existingPriority = existingItem.fieldValues.nodes.find(fv => fv.field && fv.field.name === 'Priority');
              if (existingPriority && existingPriority.name) {
                return;
              }
            } else {
              const addResult = await github.graphql(`
                mutation($projectId: ID!, $contentId: ID!) {
                  addProjectV2ItemById(input: {projectId: $projectId, contentId: $contentId}) {
                    item { id }
                  }
                }
              `, { projectId, contentId: issueNodeId });
              itemId = addResult.addProjectV2ItemById.item.id;
            }

            await github.graphql(`
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $projectId
                  itemId: $itemId
                  fieldId: $fieldId
                  value: { singleSelectOptionId: $optionId }
                }) {
                  projectV2Item { id }
                }
              }
            `, {
              projectId,
              itemId,
              fieldId: priorityField.id,
              optionId: priorityOption.id
            });

  process-submission:
    if: >
      (github.event.action == 'opened' && contains(github.event.issue.labels.*.name, 'project submission')) ||
      (github.event.action == 'labeled' && github.event.label.name == 'project submission')
    runs-on: ubuntu-latest
    concurrency:
      group: project-submission
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add eyes reaction
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              content: 'eyes'
            });

      - name: Parse issue
        uses: actions/github-script@v7
        id: parse
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body || '';

            function extractField(body, fieldName) {
              const lines = body.split('\n');
              for (let i = 0; i < lines.length; i++) {
                if (lines[i].includes(fieldName)) {
                  for (let j = i + 1; j < lines.length; j++) {
                    const val = lines[j].trim();
                    if (val && !val.startsWith('###') && !val.startsWith('_') && val !== 'No response') {
                      return val;
                    }
                  }
                }
              }
              return '';
            }

            const projectName = extractField(body, 'Project Name');
            const projectDescription = extractField(body, 'Project Description') || extractField(body, 'Description');
            const projectUrl = extractField(body, 'Project URL') || extractField(body, 'Repository URL') || extractField(body, 'URL');
            const creator = issue.user.login;

            if (!projectName) {
              core.setFailed('Could not extract project name from issue body');
              return;
            }

            const slug = projectName
              .toLowerCase()
              .replace(/[^a-z0-9\s-]/g, '')
              .replace(/\s+/g, '-')
              .replace(/-+/g, '-')
              .replace(/^-|-$/g, '');

            const branchName = `${issue.number}-${creator.toLowerCase()}-${slug}`;

            core.setOutput('project_name', projectName);
            core.setOutput('project_description', projectDescription);
            core.setOutput('project_url', projectUrl);
            core.setOutput('creator', creator);
            core.setOutput('issue_number', String(issue.number));
            core.setOutput('branch_name', branchName);

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              title: `[Project Submission] ${projectName}`
            });

      - name: Create branch and update files
        env:
          PROJECT_NAME: ${{ steps.parse.outputs.project_name }}
          PROJECT_DESCRIPTION: ${{ steps.parse.outputs.project_description }}
          PROJECT_URL: ${{ steps.parse.outputs.project_url }}
          CREATOR: ${{ steps.parse.outputs.creator }}
          BRANCH_NAME: ${{ steps.parse.outputs.branch_name }}
          ISSUE_NUMBER: ${{ steps.parse.outputs.issue_number }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH_NAME"

          ESCAPED_NAME=$(echo "$PROJECT_NAME" | sed 's/|/\\|/g')
          ESCAPED_DESC=$(echo "$PROJECT_DESCRIPTION" | sed 's/|/\\|/g')
          CREATOR_LINK="[@${CREATOR}](https://github.com/${CREATOR})"
          
          if [ -n "$PROJECT_URL" ]; then
            NAME_DISPLAY="[${ESCAPED_NAME}](${PROJECT_URL})"
          else
            NAME_DISPLAY="${ESCAPED_NAME}"
          fi
          
          NEW_ROW="| ${NAME_DISPLAY} | ${ESCAPED_DESC} | ${CREATOR_LINK} |"

          export NEW_ROW

          python3 << 'PYEOF'
          import re, os

          new_row = os.environ['NEW_ROW']

          with open("docs/FEATURED_PROJECTS.md", "r") as f:
              content = f.read()

          table_start = "<!-- FEATURED_PROJECTS_TABLE_START -->"
          table_end = "<!-- FEATURED_PROJECTS_TABLE_END -->"
          count_start = "<!-- FEATURED_COUNT_START -->"
          count_end = "<!-- FEATURED_COUNT_END -->"

          start_idx = content.index(table_start) + len(table_start)
          end_idx = content.index(table_end)
          middle = content[start_idx:end_idx]

          lines = [l.strip() for l in middle.strip().split('\n') if l.strip()]
          header_lines = [l for l in lines if l.startswith('| Name') or l.startswith('| ---') or l.startswith('|---') or l.startswith('| -')]
          data_lines = [l for l in lines if l not in header_lines]
          data_lines.insert(0, new_row)

          total = len(data_lines)

          new_middle = '\n'.join(header_lines + data_lines)
          new_content = content[:content.index(table_start) + len(table_start)] + '\n' + new_middle + '\n' + content[end_idx:]

          count_pattern = re.escape(count_start) + r'.*?' + re.escape(count_end)
          new_content = re.sub(count_pattern, count_start + str(total) + count_end, new_content)

          with open("docs/FEATURED_PROJECTS.md", "w") as f:
              f.write(new_content)
          PYEOF

          git add docs/FEATURED_PROJECTS.md
          git commit -m "feat: add project '${PROJECT_NAME}' from issue #${ISSUE_NUMBER}"
          git push origin "$BRANCH_NAME"

      - name: Create Pull Request
        uses: actions/github-script@v7
        with:
          script: |
            const branchName = '${{ steps.parse.outputs.branch_name }}';
            const projectName = '${{ steps.parse.outputs.project_name }}';
            const creator = '${{ steps.parse.outputs.creator }}';
            const issueNumber = parseInt('${{ steps.parse.outputs.issue_number }}');
            const projectUrl = '${{ steps.parse.outputs.project_url }}';
            const projectDescription = '${{ steps.parse.outputs.project_description }}';

            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Project Submission] ${projectName}`,
              head: branchName,
              base: 'main',
              body: [
                `## 🎉 New Project Submission`,
                ``,
                `| Field | Value |`,
                `|-------|-------|`,
                `| **Project** | ${projectName} |`,
                `| **Description** | ${projectDescription} |`,
                `| **URL** | ${projectUrl} |`,
                `| **Creator** | @${creator} |`,
                ``,
                `Closes #${issueNumber}`
              ].join('\n')
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.data.number,
              labels: ['project submission']
            });
            
            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.data.number,
              assignees: [creator]
            });

      - name: Comment on issue
        uses: actions/github-script@v7
        with:
          script: |
            const creator = '${{ steps.parse.outputs.creator }}';
            const projectName = '${{ steps.parse.outputs.project_name }}';
            const branchName = '${{ steps.parse.outputs.branch_name }}';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                `## 🎉 Thanks for sharing your project, @${creator}!`,
                ``,
                `Your project **${projectName}** has been submitted for review.`,
                `A pull request has been created on branch [\`${branchName}\`](https://github.com/MIKLIUM/MIKLIUM/tree/${branchName}).`,
                ``,
                `Once reviewed and merged, it will appear in our [Featured Projects](https://github.com/MIKLIUM/MIKLIUM/blob/main/docs/FEATURED_PROJECTS.md)!`
              ].join('\n')
            });