name: "API Tests"

on:
  schedule:
    - cron: '0 6 */3 * *'
  workflow_call:
    inputs:
      deploy_url:
        required: false
        type: string

permissions:
  contents: read
  deployments: read

jobs:
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name != 'schedule'
        with:
          filters: |
            apis:
              - 'api/**'

      - name: Detect changed API projects
        id: detect
        if: github.event_name != 'schedule' && steps.filter.outputs.apis == 'true'
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" || "${{ github.event_name }}" == "pull_request_target" ]]; then
            BASE=${{ github.event.pull_request.base.sha }}
            HEAD=${{ github.event.pull_request.head.sha }}
          else
            BASE=${{ github.event.before }}
            HEAD=${{ github.sha }}
          fi

          CHANGED=$(git diff --name-only "$BASE" "$HEAD" -- api/ \
            | cut -d'/' -f2 \
            | sort -u \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')

          echo "changed_projects=$CHANGED" >> "$GITHUB_OUTPUT"

      - name: Resolve deployment URL
        id: resolve
        if: github.event_name == 'schedule' || steps.filter.outputs.apis == 'true'
        run: |
          if [ "${{ github.event_name }}" == "schedule" ]; then
            echo "deploy_url=https://miklium.vercel.app" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ inputs.deploy_url }}" ]; then
            echo "deploy_url=${{ inputs.deploy_url }}" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_url=https://miklium.vercel.app" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v5
        if: github.event_name == 'schedule' || steps.filter.outputs.apis == 'true'
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: github.event_name == 'schedule' || steps.filter.outputs.apis == 'true'
        run: pip install requests toml

      - name: Run API tests
        if: github.event_name == 'schedule' || steps.filter.outputs.apis == 'true'
        env:
          BASE_URL: ${{ steps.resolve.outputs.deploy_url }}
          IS_SCHEDULE: ${{ github.event_name == 'schedule' }}
          CHANGED_PROJECTS: ${{ steps.detect.outputs.changed_projects }}
        run: python .github/scripts/api-tests.py